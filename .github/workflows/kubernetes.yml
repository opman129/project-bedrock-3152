name: Kubernetes Validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate YAML Syntax
        run: |
          python -c "
          import yaml
          import pathlib

          files = list(pathlib.Path('kubernetes').rglob('*.yaml'))
          files += list(pathlib.Path('kubernetes').rglob('*.yml'))

          for file in files:
              with open(file, 'r') as f:
                  list(yaml.safe_load_all(f))

          print(f'Validated {len(files)} Kubernetes manifest files successfully.')
          "